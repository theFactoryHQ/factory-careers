name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GITLEAKS_VERSION: 8.29.0

    steps:
      - name: Checkout full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan relevant Git history
        env:
          PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PULL_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          zero_sha="0000000000000000000000000000000000000000"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" && -n "${PULL_BASE_SHA}" && -n "${PULL_HEAD_SHA}" ]]; then
            log_opts="${PULL_BASE_SHA}..${PULL_HEAD_SHA}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && -n "${PUSH_BEFORE_SHA}" && "${PUSH_BEFORE_SHA}" != "${zero_sha}" ]]; then
            log_opts="${PUSH_BEFORE_SHA}..${GITHUB_SHA}"
          else
            log_opts="${GITHUB_SHA}"
          fi

          echo "Scanning Git log range: ${log_opts}"
          gitleaks detect --source . --config .gitleaks.toml --redact --verbose --log-opts="${log_opts}"
