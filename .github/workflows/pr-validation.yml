name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, typecheck, and test
    if: >-
      ${{
        (github.event_name != 'pull_request' || !github.event.pull_request.draft) &&
        (
          (github.event.action != 'labeled' && github.event.action != 'unlabeled') ||
          github.event.label.name == 'skip-changelog'
        )
      }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: factory_notifications_ci
          POSTGRES_PASSWORD: factory_notifications_ci
          POSTGRES_DB: factory_notifications_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U factory_notifications_ci -d factory_notifications_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: 'https://npm.pkg.github.com'

      - name: Changelog policy
        id: changelog
        run: npm run changelog:check
        env:
          PR_PREFLIGHT_BASE_REF: origin/${{ github.base_ref || 'main' }}
          PR_PREFLIGHT_HEAD_REF: ${{ github.event.pull_request.head.sha || github.sha }}
          CHANGELOG_SKIP: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}

      - name: Install dependencies
        id: install
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_READ_TOKEN }}

      - name: Check CLI parity evidence
        id: cli_parity
        run: npm run preflight:cli-parity
        env:
          PR_PREFLIGHT_BASE_REF: origin/${{ github.base_ref || 'main' }}

      - name: Run unit tests
        id: tests
        run: npm run test:unit

      - name: Run application notification PostgreSQL integration test
        run: npm run test:integration:application-notifications
        env:
          APPLICATION_NOTIFICATION_PG_TEST_URL: postgresql://factory_notifications_ci:factory_notifications_ci@127.0.0.1:5432/postgres
          APPLICATION_NOTIFICATION_PG_REQUIRED: "true"

      - name: Lint
        id: lint
        run: npm run lint

      - name: Typecheck
        id: typecheck
        run: npm run typecheck

      - name: Run CLI smoke tests
        id: cli_smoke
        run: |
          ./packages/careers-cli/bin/factory-careers.mjs --help
          ./packages/careers-cli/bin/factory-careers.mjs auth status --json
          ./packages/careers-cli/bin/factory-careers.mjs jobs --help
          ./packages/careers-cli/bin/factory-careers.mjs feedback --help
          ./packages/careers-cli/bin/factory-careers.mjs system --help

      - name: Audit dependencies (high severity+)
        id: audit
        run: npm audit --audit-level=high

      - name: Validate production environment contract
        id: production_env
        run: npm run ops:validate-production-env
        env:
          DATABASE_URL: postgresql://factory_app:database-password-for-ci-prod-check@db.internal:5432/factory_careers
          BETTER_AUTH_SECRET: ci-production-contract-secret-with-40-characters
          BETTER_AUTH_URL: https://careers.thefactory.com
          BETTER_AUTH_TRUSTED_ORIGINS: https://careers.thefactory.com
          NUXT_PUBLIC_SITE_URL: https://careers.thefactory.com
          CRON_SECRET: ci-production-contract-cron-secret-32chars
          S3_ENDPOINT: https://s3.us-east-1.amazonaws.com
          S3_ACCESS_KEY: ci-production-access-key
          S3_SECRET_KEY: ci-production-secret-key-material
          S3_BUCKET: factory-careers-documents
          S3_REGION: us-east-1
          S3_FORCE_PATH_STYLE: "false"
          SMTP_HOST: smtp.mailprovider.test
          SMTP_PORT: "587"
          SMTP_SECURE: "false"
          SMTP_FROM: noreply@thefactory.com

      - name: Build
        id: build
        run: |
          start=$(date +%s)
          npm run build
          end=$(date +%s)
          echo "build_duration=$((end - start))" >> "$GITHUB_ENV"

      - name: PR Validation Summary
        if: ${{ always() && !cancelled() }}
        run: |
          echo "## PR Validation Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          status_icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }

          echo "| Changelog policy | $(status_icon '${{ steps.changelog.outcome }}') ${{ steps.changelog.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Install dependencies | $(status_icon '${{ steps.install.outcome }}') ${{ steps.install.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CLI parity evidence | $(status_icon '${{ steps.cli_parity.outcome }}') ${{ steps.cli_parity.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | $(status_icon '${{ steps.tests.outcome }}') ${{ steps.tests.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint | $(status_icon '${{ steps.lint.outcome }}') ${{ steps.lint.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Typecheck | $(status_icon '${{ steps.typecheck.outcome }}') ${{ steps.typecheck.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CLI smoke tests | $(status_icon '${{ steps.cli_smoke.outcome }}') ${{ steps.cli_smoke.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency audit | $(status_icon '${{ steps.audit.outcome }}') ${{ steps.audit.outcome }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Production env contract | $(status_icon '${{ steps.production_env.outcome }}') ${{ steps.production_env.outcome }} |" >> "$GITHUB_STEP_SUMMARY"

          if [ -f audit-output.txt ] && [ "${{ steps.audit.outcome }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>Audit details</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat audit-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "| Build | $(status_icon '${{ steps.build.outcome }}') ${{ steps.build.outcome }} (${build_duration:-?}s) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Run: \`${{ github.run_id }}\` · Commit: \`${{ github.sha }}\`_" >> "$GITHUB_STEP_SUMMARY"
