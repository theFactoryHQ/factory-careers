name: Demote GitHub Release

on:
  workflow_call:
    inputs:
      release-tag:
        description: Strictly validated release tag to demote.
        required: true
        type: string

permissions:
  contents: write

jobs:
  demote:
    name: Demote and verify release
    runs-on: ubuntu-latest
    steps:
      - name: Demote release to pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" --prerelease --latest=false
          if [[ "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" != "true" ]]; then
            echo "Release $RELEASE_TAG was not demoted to a pre-release" >&2
            exit 1
          fi

          latest_release_error="$(mktemp)"
          trap 'rm -f "$latest_release_error"' EXIT
          if latest_tag="$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .tag_name 2>"$latest_release_error")"; then
            if [[ "$latest_tag" == "$RELEASE_TAG" ]]; then
              echo "Release $RELEASE_TAG is still advertised as latest" >&2
              exit 1
            fi
          elif grep -q 'HTTP 404' "$latest_release_error"; then
            echo "No stable latest release remains after demoting $RELEASE_TAG."
          else
            cat "$latest_release_error" >&2
            exit 1
          fi
