name: Release Verification

# Fires after release-please publishes a GitHub Release (which also pushes a
# `v*` tag and triggers docker-publish.yml). This workflow is the last gate
# in the chain and provides two guarantees:
#
#   1. smoke-test: the *published* image (not a locally-built one) actually
#      starts cleanly using the same setup.sh + docker-compose flow that
#      self-hosters follow. If this fails, the release is auto-marked as a
#      pre-release so it stops being advertised as the "Latest" release.
#
#   2. bundle: attach a self-hoster bundle (docker-compose.production.yml
#      with the image tag pinned + setup.sh) to the GitHub Release so users
#      can `curl -L .../releases/download/v1.0.0/factory-careers-1.0.0.tar.gz` and
#      get a deterministic, version-locked install.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-verification-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: Resolve and validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve release tag
        id: tag
        env:
          RELEASE_EVENT_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${RELEASE_EVENT_TAG:-$DISPATCH_TAG}"
          if [[ ! "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Demote event release when tag validation fails
        if: failure() && github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_ID: ${{ github.event.release.id }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_ID" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid release ID: $RELEASE_ID" >&2
            exit 1
          fi
          gh api \
            --method PATCH \
            "repos/{owner}/{repo}/releases/${RELEASE_ID}" \
            -F prerelease=true \
            -f make_latest=false

  release-notes:
    name: Validate curated changelog release notes
    needs: resolve-tag
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Extract curated release notes
        run: npm run --silent changelog:extract -- "$RELEASE_VERSION" > release-notes.md

      - name: Fetch published release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release view "$RELEASE_TAG" --json body --jq .body > published-release-notes.md

      - name: Verify published release notes
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs'

          const normalize = value => value.replace(/\r\n/g, '\n').trimEnd()
          const expected = normalize(readFileSync('release-notes.md', 'utf8'))
          const actual = normalize(readFileSync('published-release-notes.md', 'utf8'))

          if (actual !== expected) {
            console.error('Published release notes do not match the curated CHANGELOG.md section.')
            process.exit(1)
          }
          NODE

  release-notes-demotion:
    name: Demote release after release-note failure
    needs: [resolve-tag, release-notes]
    if: ${{ always() && needs.release-notes.result == 'failure' }}
    uses: ./.github/workflows/demote-release.yml
    with:
      release-tag: ${{ needs.resolve-tag.outputs.tag }}

  smoke-test:
    name: Smoke-test published image
    needs: [resolve-tag, release-notes]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - name: Pin compose file to the released image tag
        run: |
          set -euo pipefail
          sed -i \
            "s|ghcr.io/thefactoryhq/factory-careers:latest|ghcr.io/thefactoryhq/factory-careers:${RELEASE_VERSION}|" \
            docker-compose.production.yml
          grep "ghcr.io/thefactoryhq/factory-careers" docker-compose.production.yml

      - name: Wait for the published image to be available on GHCR
        run: |
          set -euo pipefail
          # docker-publish.yml is triggered by the same tag push, so it may
          # still be running when this job starts. Poll for up to 20 minutes.
          for i in $(seq 60); do
            if docker manifest inspect "ghcr.io/thefactoryhq/factory-careers:${RELEASE_VERSION}" > /dev/null 2>&1; then
              echo "✅ Image is available"
              exit 0
            fi
            echo "  attempt $i/60 — image not yet published, waiting 20s..."
            sleep 20
          done
          echo "❌ Image ghcr.io/thefactoryhq/factory-careers:${RELEASE_VERSION} never appeared"
          exit 1

      - name: Generate .env via setup.sh
        run: |
          chmod +x ./setup.sh
          ./setup.sh

      - name: Start full stack against the published image
        run: docker compose -f docker-compose.production.yml up -d

      - name: Wait for app to be reachable
        run: |
          set -euo pipefail
          for i in $(seq 60); do
            if curl -fs http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ App reachable"
              exit 0
            fi
            sleep 3
          done
          echo "❌ App did not become reachable"
          docker compose -f docker-compose.production.yml logs app --tail=200
          exit 1

      - name: Assert migrations + S3 bucket ready
        run: |
          set -euo pipefail
          # Startup messages can land slightly after the HTTP port opens, so
          # poll instead of one-shot grepping to avoid flaky failures.
          for i in $(seq 40); do
            logs="$(docker compose -f docker-compose.production.yml logs app || true)"
            if grep -q "Database migrations applied successfully" <<<"$logs" \
              && grep -q 'S3 bucket "factory-careers" is ready' <<<"$logs"; then
              echo "✅ Migrations + S3 ready messages found (attempt $i)"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Required startup messages missing after polling"
          docker compose -f docker-compose.production.yml logs app
          exit 1

  smoke-test-demotion:
    name: Demote release after smoke-test failure
    needs: [resolve-tag, smoke-test]
    if: ${{ always() && needs.smoke-test.result == 'failure' }}
    uses: ./.github/workflows/demote-release.yml
    with:
      release-tag: ${{ needs.resolve-tag.outputs.tag }}

  bundle:
    name: Attach self-hoster bundle
    needs: [resolve-tag, smoke-test]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-tag.outputs.tag }}
      RELEASE_VERSION: ${{ needs.resolve-tag.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}
          persist-credentials: false

      - name: Build version-pinned bundle
        run: |
          set -euo pipefail
          mkdir -p "bundle/factory-careers-${RELEASE_VERSION}"
          cp setup.sh "bundle/factory-careers-${RELEASE_VERSION}/"
          cp SELF-HOSTING.md "bundle/factory-careers-${RELEASE_VERSION}/"
          # Pin the compose file to the exact released image tag so users
          # who download the bundle get a deterministic install.
          sed \
            "s|ghcr.io/thefactoryhq/factory-careers:latest|ghcr.io/thefactoryhq/factory-careers:${RELEASE_VERSION}|" \
            docker-compose.production.yml \
            > "bundle/factory-careers-${RELEASE_VERSION}/docker-compose.production.yml"

          cat > "bundle/factory-careers-${RELEASE_VERSION}/INSTALL.txt" <<EOF
          Factory Careers $RELEASE_TAG — Self-Hoster Bundle

          1. ./setup.sh
          2. docker compose -f docker-compose.production.yml up -d
          3. Open http://localhost:3000

          The image tag in docker-compose.production.yml is pinned to
          $RELEASE_VERSION. To upgrade later, download the
          newer release bundle and re-run docker compose up -d.

          Full guide: SELF-HOSTING.md
          EOF

          tar -czf "factory-careers-${RELEASE_VERSION}.tar.gz" -C bundle "factory-careers-${RELEASE_VERSION}"
          sha256sum "factory-careers-${RELEASE_VERSION}.tar.gz" > "factory-careers-${RELEASE_VERSION}.tar.gz.sha256"

      - name: Attach bundle to the GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "factory-careers-${RELEASE_VERSION}.tar.gz" \
            "factory-careers-${RELEASE_VERSION}.tar.gz.sha256" \
            --clobber
